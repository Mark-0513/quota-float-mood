name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish macOS unsigned/ad-hoc beta
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Install XcodeGen
        run: brew install xcodegen
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - run: npm run test:release-contract
      - name: Build the unsigned/ad-hoc universal beta
        run: SIGN_IDENTITY=- NOTARIZE=0 scripts/build-macos-distribution.sh
      - name: Publish v0.2.0 macOS beta assets
        uses: softprops/action-gh-release@v2
        with:
          name: Quota Float Mood v0.2.0
          body_path: docs/RELEASE_TEMPLATE.md
          prerelease: true
          files: |
            release/Quota-Float-Mood-v0.2.0-macOS-Universal.dmg
            release/Quota-Float-Mood-v0.2.0-macOS-Universal.dmg.sha256
