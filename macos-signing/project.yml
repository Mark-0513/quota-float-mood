name: QuotaFloatMoodSigning
options:
  bundleIdPrefix: com.mark0513.quotafloatmood
  deploymentTarget:
    macOS: "14.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "5.0"
targets:
  QuotaFloatMoodSigningHost:
    type: application
    platform: macOS
    sources:
      - path: SigningHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mark0513.quotafloatmood
        PRODUCT_NAME: Quota Float Mood
        MARKETING_VERSION: 0.2.0
        INFOPLIST_FILE: SigningHost/Info.plist
        CODE_SIGN_IDENTITY: Apple Development
    dependencies:
      - target: QuotaFloatMoodWidget
        embed: true
  QuotaFloatMoodWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: ../src-macos-widget/QuotaFloatWidget.swift
      - path: ../src-macos-widget/Core
      - path: ../src-macos-widget/Data
      - path: ../src-macos-widget/Views
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mark0513.quotafloatmood.widget
        PRODUCT_NAME: Quota Float Mood Widget
        INFOPLIST_FILE: ../src-macos-widget/Info.plist
        CODE_SIGN_ENTITLEMENTS: ../src-macos-widget/QuotaFloatWidget.entitlements
        CODE_SIGN_IDENTITY: Apple Development
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
        CURRENT_PROJECT_VERSION: 2
        MARKETING_VERSION: 0.2.0
  QuotaFloatMoodWidgetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ../src-macos-widget-tests
      - path: ../src-macos-widget/Core
      - path: ../src-macos-widget/Data
schemes:
  QuotaFloatMoodSigningHost:
    build:
      targets:
        QuotaFloatMoodSigningHost: all
        QuotaFloatMoodWidget: all
    test:
      targets:
        - QuotaFloatMoodWidgetTests
